<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>王五导航 · 5IUX</title>
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.13.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
  <style>
    body { font-size: 14px; background: #f4f8fb; overflow-x: hidden; }
    a { text-decoration: none; }
    a:hover { text-decoration: none; }

    .banner-video {
      position: absolute;
      width: 100%; overflow: hidden;
      left: 0; top: 0;
      max-height: 750px;
    }
    .banner-video video { width: 2048px; float: left; }
    .bottom-cover {
      width: 100%; height: 50%;
      position: absolute; bottom: 0; z-index: 10;
    }

    .navbar-light .navbar-nav .nav-link { color: #fff; }
    .navbar-light .navbar-nav .active .nav-link { color: #fff; }
    .navbar-light .navbar-nav .nav-link:hover { color: #fff; }
    .navbar-brand-text {
      color: #fff; font-size: 1.1rem; font-weight: 900;
      letter-spacing: 0.05em; cursor: pointer;
    }
    .navbar-brand-text:hover { color: #fff; }

    #search {
      width: 100%; margin: 0; padding: 0 0 10px;
      position: relative; z-index: 2000; border-radius: 5px;
    }
    #search form { position: relative; }

    .search-type-tabs {
      display: flex; flex-wrap: nowrap;
      margin-bottom: 0; padding-left: 0;
      list-style: none; gap: 0;
    }
    .search-type-tabs li {
      display: inline-block;
      background: rgba(255,255,255,0.4);
      border-radius: 3px 3px 0 0;
    }
    .search-type-tabs li label {
      display: inline-block; padding: 0 14px;
      font-size: 14px; line-height: 31px;
      border-radius: 3px 3px 0 0;
      cursor: pointer; margin: 0;
      color: #555; font-weight: 600;
      transition: background 0.2s;
    }
    .search-type-tabs li.active label,
    .search-type-tabs li label:hover { background: #fff; }

    #search-text {
      width: 100%; height: 50px; line-height: 50px;
      text-indent: 10px; font-size: 16px;
      border-radius: 0 5px 5px 5px;
      background-color: #fff; border: none;
      box-shadow: 0 0.5rem 0.625rem #d4d4d44d;
      transition: 0.3s all linear; outline: 0;
    }
    #search-text:focus {
      background: #fff;
      box-shadow: 0 0px 24px 0 rgba(50,50,50,0.08);
    }
    #search button.submit {
      position: absolute; top: 0; right: 0;
      background: none; border: 0;
      width: 60px; height: 50px;
      line-height: 50px; outline: none; cursor: pointer;
    }
    #search button.submit i { color: #aaa; font-size: 18px; }
    #search button.submit:hover i { color: #1677ff; }

    .quick-engines-row {
      display: flex; flex-wrap: nowrap; gap: 0;
      margin-top: 10px; overflow-x: auto;
      scrollbar-width: none;
    }
    .quick-engines-row::-webkit-scrollbar { display: none; }
    .qe-btn {
      background: rgba(255,255,255,0.25);
      border: none; outline: none;
      padding: 4px 14px; cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 0.88rem; font-weight: 600;
      border-radius: 14px; margin-right: 6px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .qe-btn:hover { background: rgba(255,255,255,0.4); color: #fff; }
    .qe-btn.active { background: rgba(255,255,255,0.9); color: #333; }

    .mylist {
      list-style: none; padding: 10px 20px;
      position: relative; z-index: 1000;
      margin: 20px 0; border-radius: 15px;
      background: #fff;
      box-shadow: 0 0.5rem 0.625rem #d4d4d44d;
    }
    .mylist li.title {
      width: 100%; min-width: auto; margin: 0;
      height: 35px; font-size: 16px; line-height: 33px;
      padding: 0 20px 0 10px;
      border-bottom: 1px solid #eee;
      margin-bottom: 10px;
      color: #333; font-weight: 700;
    }
    .mylist li.site-item {
      width: 100px; transition: 0.3s all linear;
      font-size: 14px; overflow: hidden;
      padding: 10px 0; border-radius: 10px;
      display: inline-block;
    }
    .mylist li.site-item:hover { background: #eee; }
    .mylist li.site-item a { color: #555; display: block; text-align: center; }
    .site-icon-wrap {
      width: 45px; height: 45px; padding: 8px;
      background: #fff; border: 1px solid #eee;
      border-radius: 10px; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
    }
    .site-icon-wrap img { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }
    .site-name {
      width: 100%; display: block;
      height: 26px; line-height: 26px;
      text-align: center; font-size: 13px;
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; padding: 0 4px;
    }

    #net-toggle {
      position: fixed; top: 12px; right: 16px;
      z-index: 99999;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff; border-radius: 20px;
      padding: 4px 14px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #net-toggle:hover { background: rgba(255,255,255,0.3); }

    @media screen and (max-width: 992px) {
      .banner-video video { width: 1200px; }
      div#navbarsMain { background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 20px; }
    }
    @media screen and (max-width: 767px) {
      .banner-video video { width: 960px; }
      .mylist { border-radius: 8px; }
      .mylist li.site-item { margin: 5px 0; }
      .site-icon-wrap { width: 30px; height: 30px; padding: 5px; border-radius: 5px; }
      .site-icon-wrap img { width: 20px; height: 20px; }
      .site-name { font-size: 12px; }
    }
    @media screen and (min-width: 1200px) { .mylist li.site-item { min-width: 132px; } }
    @media screen and (min-width: 992px) and (max-width: 1200px) { .mylist li.site-item { min-width: 110px; } }

    ::-webkit-scrollbar { width: 8px; height: 8px; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: #eee; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #ccc; }
  </style>
</head>
<body>

<div class="banner-video">
  <video autoplay loop muted>
    <source src="https://cdn.jsdelivr.net/gh/5iux/uploads/pic/3840-banner.mp4" type="video/mp4">
  </video>
  <div class="bottom-cover" style="background-image: linear-gradient(rgba(255,255,255,0) 0%, rgb(244 248 251 / 0.6) 50%, rgb(244 248 251) 100%);"></div>
</div>

<button id="net-toggle">🌐 外网</button>

<nav class="navbar navbar-expand-lg navbar-light fixed-top" style="position:absolute;z-index:10000;">
  <a class="navbar-brand navbar-brand-text" id="brand-title" href="#">🧭 王五导航</a>
  <button class="navbar-toggler" style="border:none;outline:none;"
    type="button" data-toggle="collapse" data-target="#navbarsMain">
    <i class="fas fa-bars" style="color:#fff;"></i>
  </button>
  <div class="collapse navbar-collapse" id="navbarsMain"></div>
</nav>

<div class="container" style="margin-top:100px;position:relative;z-index:100;">
  <div id="search">
    <ul class="search-type-tabs" id="search-cat-tabs"></ul>
    <form id="search-form" onsubmit="doSearch(event)">
      <input type="text" id="search-text" placeholder="搜索网页…" autocomplete="off">
      <button class="submit" type="submit"><i class="fas fa-search"></i></button>
    </form>
    <div class="quick-engines-row" id="quick-engines-row"></div>
  </div>
  <div id="content">
    <p style="color:#999;text-align:center;padding:3rem;">加载中...</p>
  </div>
</div>

<p class="mt-5 mb-3 text-muted text-center" style="position:relative;z-index:100;">
  ©2025 王五导航. All rights reserved.
</p>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ══ 模式切换 ══ */
const MODES = ['normal', 'webstack', 'easy', 'nav', '5iux'];
localStorage.setItem('navMode', '5iux');

document.getElementById('brand-title').addEventListener('click', () => {
  const next = MODES[(MODES.indexOf('5iux') + 1) % MODES.length];
  localStorage.setItem('navMode', next);
  window.location.href = '../index.html';
});

/* ══ 配置 ══ */
const WORKER_URL   = 'https://ico.xmynscnq.dpdns.org';
const LINKS_FILE   = '../links.json';
const DEFAULT_ICON = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOTk5IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiPjwvY2lyY2xlPjxwYXRoIGQ9Ik0yIDEyaDIwIj48L3BhdGg+PHBhdGggZD0iTTEyIDJhMTUuMyAxNS4zIDAgMCAxIDQgMTAgMTUuMyAxNS4zIDAgMCAxLTQgMTAgMTUuMyAxNS4zIDAgMCAxLTQtMTAgMTUuMyAxNS4zIDAgMCAxIDQtMTB6Ij48L3BhdGg+PC9zdmc+';

const SEARCH_CATEGORIES = [
  { id:'engine', label:'引擎', engines:[
    { name:'百度',    url:'https://www.baidu.com/s?wd=' },
    { name:'Google',  url:'https://www.google.com/search?q=' },
    { name:'Brave',   url:'https://search.brave.com/search?q=' },
    { name:'搜狗',    url:'https://www.sogou.com/web?query=' },
    { name:'Bing',    url:'https://www.bing.com/search?q=' },
    { name:'DuckDuck',url:'https://duckduckgo.com/?q=' },
  ]},
  { id:'community', label:'社区', engines:[
    { name:'GitHub', url:'https://github.com/search?q=' },
    { name:'微博',   url:'https://s.weibo.com/weibo?q=' },
    { name:'知乎',   url:'https://www.zhihu.com/search?q=' },
    { name:'豆瓣',   url:'https://www.douban.com/search?q=' },
    { name:'贴吧',   url:'https://tieba.baidu.com/f/search/res?qw=' },
    { name:'Reddit', url:'https://www.reddit.com/search/?q=' },
  ]},
  { id:'video', label:'视频', engines:[
    { name:'B站',    url:'https://search.bilibili.com/all?keyword=' },
    { name:'腾讯',   url:'https://v.qq.com/search.html#stag=0&s=' },
    { name:'爱奇艺', url:'https://so.iqiyi.com/so/q_' },
    { name:'优酷',   url:'https://so.youku.com/search_video/q_' },
  ]},
  { id:'music', label:'音乐', engines:[
    { name:'QQ音乐', url:'https://y.qq.com/portal/search.html#page=1&searchid=1&remoteplace=txt.yqq.top&t=song&w=' },
    { name:'网易云', url:'https://music.163.com/#/search/m/?s=' },
  ]},
  { id:'life', label:'生活', engines:[
    { name:'淘宝', url:'https://s.taobao.com/search?q=' },
    { name:'京东', url:'https://search.jd.com/Search?keyword=' },
    { name:'翻译', url:'https://fanyi.baidu.com/#zh/en/' },
  ]},
  { id:'job', label:'求职', engines:[
    { name:'BOSS直聘',url:'https://www.zhipin.com/web/geek/job?query=' },
    { name:'智联',    url:'https://sou.zhaopin.com/?jl=530&kw=' },
    { name:'猎聘',    url:'https://www.liepin.com/zhaopin/?key=' },
  ]},
];

let currentCatId = 'engine';
let currentEngine = SEARCH_CATEGORIES[0].engines[0];
let isIntranet = localStorage.getItem('netMode') === 'intranet';

function getDomain(url) { try { return new URL(url).hostname; } catch { return null; } }
function faviconSrc(url) { const d = getDomain(url); return d ? `${WORKER_URL}/?domain=${d}` : DEFAULT_ICON; }
function getCardUrl(item) { return (isIntranet && item.intranet) ? item.intranet : item.url; }

function renderCatTabs() {
  const el = document.getElementById('search-cat-tabs');
  if (!el) return;
  el.innerHTML = '';
  SEARCH_CATEGORIES.forEach(cat => {
    const li = document.createElement('li');
    li.className = cat.id === currentCatId ? 'active' : '';
    const label = document.createElement('label');
    label.textContent = cat.label;
    label.onclick = () => { currentCatId = cat.id; currentEngine = cat.engines[0]; renderCatTabs(); renderQuickEngines(); };
    li.appendChild(label);
    el.appendChild(li);
  });
}

function renderQuickEngines() {
  const wrap = document.getElementById('quick-engines-row');
  if (!wrap) return;
  wrap.innerHTML = '';
  const cat = SEARCH_CATEGORIES.find(c => c.id === currentCatId);
  if (!cat) return;
  cat.engines.forEach(engine => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'qe-btn' + (engine === currentEngine ? ' active' : '');
    btn.textContent = engine.name;
    btn.onclick = () => { currentEngine = engine; renderQuickEngines(); document.getElementById('search-text')?.focus(); };
    wrap.appendChild(btn);
  });
}

function doSearch(e) {
  if (e) e.preventDefault();
  const kw = document.getElementById('search-text')?.value.trim();
  if (kw) window.open(currentEngine.url + encodeURIComponent(kw), '_blank');
}

function updateNetBtn() {
  const btn = document.getElementById('net-toggle');
  if (btn) btn.textContent = isIntranet ? '🏠 内网' : '🌐 外网';
}
document.getElementById('net-toggle').addEventListener('click', () => {
  isIntranet = !isIntranet;
  localStorage.setItem('netMode', isIntranet ? 'intranet' : 'internet');
  updateNetBtn();
  if (window._allData) renderLinks(window._allData);
});
updateNetBtn();

function renderLinks(data) {
  const main = document.getElementById('content');
  if (!main) return;
  main.innerHTML = '';
  data.forEach(({ section, items }) => {
    const ul = document.createElement('ul');
    ul.className = 'mylist row';
    const titleLi = document.createElement('li');
    titleLi.className = 'title';
    titleLi.textContent = section;
    ul.appendChild(titleLi);
    items.forEach(item => {
      const url     = getCardUrl(item);
      const iconSrc = item.icon || faviconSrc(url);
      const title   = (item.title || '').replace(/</g, '&lt;');
      const li = document.createElement('li');
      li.className = 'col-3 col-sm-3 col-md-2 col-lg-1 site-item';
      li.innerHTML = `<a href="${url}" target="_blank"><div class="site-icon-wrap"><img src="${iconSrc}" onerror="this.src='${DEFAULT_ICON}';this.onerror=null;" alt="${title}"></div><span class="site-name">${title}</span></a>`;
      ul.appendChild(li);
    });
    main.appendChild(ul);
  });
}

(async () => {
  renderCatTabs();
  renderQuickEngines();
  try {
    const res  = await fetch(LINKS_FILE);
    const data = await res.json();
    window._allData = data;
    renderLinks(data);
  } catch (err) {
    console.error('加载 links.json 失败：', err);
    document.getElementById('content').innerHTML = '<p style="color:#999;text-align:center;padding:3rem;">链接数据加载失败</p>';
  }
})();
</script>
</body>
</html>
