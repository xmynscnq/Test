<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>王五导航 · AI检索</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<button id="netModeBtn" onclick="toggleNetMode()" class="net-mode-btn">🌐 外网</button>
<div class="container">
  <div class="header-area">
    <h1 id="site-title" title="点击切换模式">王五导航</h1>
  </div>
  <div class="ai-search-wrapper">
    <div class="ai-search-box">
      <span class="ai-search-icon">✨</span>
      <input type="text" id="aiSearchInput" autocomplete="off"
             placeholder="例如：想要一个免费的、能一键生成3D动漫头像的网站..."/>
      <button onclick="handleSearch()">AI 检索</button>
    </div>
    <div class="ai-model-bar">
      <span class="ai-model-label">参与检索的模型</span>
      <div id="modelContainer"></div>
    </div>
  </div>
  <main id="aiResultsSection" class="ai-results hidden"></main>
  <section class="shortcut-section">
    <div id="shortcutGrid"></div>
  </section>
</div>
<script src="main.js"></script>
</body>
</html>
