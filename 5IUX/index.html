<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>王五导航 · 5IUX</title>
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/jquery.min.js"></script>
</head>
<body>

<div class="banner-video">
  <video autoplay loop muted>
    <source src="https://cdn.jsdelivr.net/gh/xmynscnq/Test/5IUX/pics/banner1.webm" type="video/webm">
  </video>
  <div class="bottom-cover" style="background-image: linear-gradient(rgba(255,255,255,0) 0%, rgb(244 248 251 / 0.6) 50%, rgb(244 248 251) 100%);"></div>
</div>

<button id="net-toggle">🌐 外网</button>

<nav class="navbar navbar-expand-lg navbar-light fixed-top" style="position:absolute;z-index:10000;">
  <a class="navbar-brand navbar-brand-text" id="brand-title" href="#">🧭 王五导航</a>
  <button class="navbar-toggler" style="border:none;outline:none;"
    type="button" data-toggle="collapse" data-target="#navbarsMain">
    <i class="fas fa-bars" style="color:#fff;"></i>
  </button>
  <div class="collapse navbar-collapse" id="navbarsMain"></div>
</nav>

<div class="container" style="margin-top:100px;position:relative;z-index:100;">
  <div id="search">
    <div id="search-list">
      <div class="search-group s-current">
        <ul class="search-type" id="search-type-ul"></ul>
      </div>
    </div>
    <form id="search-form" onsubmit="doSearch(event)">
      <input type="text" id="search-text" placeholder="百度一下" autocomplete="off">
      <button class="submit" type="submit"><img src="pics/sou.svg" style="width:20px;height:20px;" alt="搜索"></button>
      <ul id="word" style="display:none;"></ul>
    </form>
  </div>
  <div id="content">
    <p style="color:#999;text-align:center;padding:3rem;">加载中...</p>
  </div>
</div>

<p class="mt-5 mb-3 text-muted text-center" style="position:relative;z-index:100;">
  ©2025 王五导航. All rights reserved.
</p>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/sou.js"></script>
<script>
/* ══ 模式切换 ══ */
const MODES = ['normal', 'webstack', 'easy', 'nav', '5iux'];
localStorage.setItem('navMode', '5iux');
document.getElementById('brand-title').addEventListener('click', () => {
  const next = MODES[(MODES.indexOf('5iux') + 1) % MODES.length];
  localStorage.setItem('navMode', next);
  window.location.href = '../index.html';
});

/* ══ 配置 ══ */
const WORKER_URL   = 'https://ico.xmynscnq.dpdns.org';
const LINKS_FILE   = '../links.json';
const DEFAULT_ICON = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOTk5IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiPjwvY2lyY2xlPjxwYXRoIGQ9Ik0yIDEyaDIwIj48L3BhdGg+PHBhdGggZD0iTTEyIDJhMTUuMyAxNS4zIDAgMCAxIDQgMTAgMTUuMyAxNS4zIDAgMCAxLTQgMTAgMTUuMyAxNS4zIDAgMCAxLTQtMTAgMTUuMyAxNS4zIDAgMCAxIDQtMTB6Ij48L3BhdGg+PC9zdmc+';

/* ══ 内外网 & 工具函数 ══ */
let isIntranet = localStorage.getItem('netMode') === 'intranet';
function getDomain(url) { try { return new URL(url).hostname; } catch { return null; } }
function faviconSrc(url) { const d = getDomain(url); return d ? `${WORKER_URL}/?domain=${d}` : DEFAULT_ICON; }
function getCardUrl(item) { return (isIntranet && item.intranet) ? item.intranet : item.url; }

/* ══ 搜索引擎列表 ══ */
const ENGINES = [
  { name:'百度',      url:'https://www.baidu.com/s?wd=',                                                          placeholder:'百度一下' },
  { name:'Google',    url:'https://www.google.com/search?q=',                                                     placeholder:'谷歌搜索' },
  { name:'Brave',     url:'https://search.brave.com/search?q=',                                                   placeholder:'Brave搜索' },
  { name:'搜狗',      url:'https://www.sogou.com/web?query=',                                                     placeholder:'搜狗搜索' },
  { name:'Bing',      url:'https://www.bing.com/search?q=',                                                       placeholder:'Bing搜索' },
  { name:'DuckDuckGo',url:'https://duckduckgo.com/?q=',                                                           placeholder:'隐私搜索' },
  { name:'360',       url:'https://www.so.com/s?q=',                                                              placeholder:'360搜索' },
  { name:'夸克',      url:'https://www.quark.cn/s?q=',                                                            placeholder:'夸克搜索' },
  { name:'GitHub',    url:'https://github.com/search?q=',                                                         placeholder:'搜索GitHub' },
  { name:'微博',      url:'https://s.weibo.com/weibo?q=',                                                         placeholder:'微博搜索' },
  { name:'知乎',      url:'https://www.zhihu.com/search?q=',                                                      placeholder:'搜索知乎' },
  { name:'B站',       url:'https://search.bilibili.com/all?keyword=',                                             placeholder:'搜索B站' },
  { name:'抖音',      url:'https://www.douyin.com/search/',                                                       placeholder:'搜索抖音' },
  { name:'QQ音乐',    url:'https://y.qq.com/portal/search.html#page=1&searchid=1&remoteplace=txt.yqq.top&t=song&w=', placeholder:'搜索QQ音乐' },
  { name:'网易云',    url:'https://music.163.com/#/search/m/?s=',                                                 placeholder:'搜索网易云' },
  { name:'做菜',      url:'https://www.xiachufang.com/search/?keyword=',                                          placeholder:'搜索菜谱' },
  { name:'翻译',      url:'https://fanyi.baidu.com/#zh/en/',                                                      placeholder:'百度翻译' },
];

function renderEngines() {
  const ul = document.getElementById('search-type-ul');
  if (!ul) return;
  ul.innerHTML = '';
  ENGINES.forEach((engine, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<input ${i===0?'checked':''} hidden type="radio" name="type" id="type-${i}" value="${engine.url}" data-placeholder="${engine.placeholder}"><label for="type-${i}">${engine.name}</label>`;
    ul.appendChild(li);
  });
  ul.querySelectorAll('input[type=radio]').forEach(input => {
    input.addEventListener('change', () => {
      document.getElementById('search-text').placeholder = input.dataset.placeholder;
      document.getElementById('search-text').focus();
    });
  });
}

function doSearch(e) {
  if (e) e.preventDefault();
  const kw = document.getElementById('search-text')?.value.trim();
  const checked = document.querySelector('#search-type-ul input[type=radio]:checked');
  const url = checked ? checked.value : ENGINES[0].url;
  if (kw) window.open(url + encodeURIComponent(kw), '_blank');
}

function updateNetBtn() {
  const btn = document.getElementById('net-toggle');
  if (btn) btn.textContent = isIntranet ? '🏠 内网' : '🌐 外网';
}
document.getElementById('net-toggle').addEventListener('click', () => {
  isIntranet = !isIntranet;
  localStorage.setItem('netMode', isIntranet ? 'intranet' : 'internet');
  updateNetBtn();
  if (window._allData) renderLinks(window._allData);
});
updateNetBtn();

function renderLinks(data) {
  const main = document.getElementById('content');
  if (!main) return;
  main.innerHTML = '';
  data.forEach(({ section, items }) => {
    const ul = document.createElement('ul');
    ul.className = 'mylist row';
    const titleLi = document.createElement('li');
    titleLi.className = 'title';
    titleLi.textContent = section;
    ul.appendChild(titleLi);
    items.forEach(item => {
      const url     = getCardUrl(item);
      const iconSrc = item.icon || faviconSrc(url);
      const title   = (item.title || '').replace(/</g, '&lt;');
      const li = document.createElement('li');
      li.className = 'col-3 col-sm-3 col-md-2 col-lg-1 site-item';
      li.innerHTML = `<a href="${url}" target="_blank"><div class="site-icon-wrap"><img src="${iconSrc}" onerror="this.src='${DEFAULT_ICON}';this.onerror=null;" alt="${title}"></div><span class="site-name">${title}</span></a>`;
      ul.appendChild(li);
    });
    main.appendChild(ul);
  });
}

(async () => {
  renderEngines();
  try {
    const res  = await fetch(LINKS_FILE);
    const data = await res.json();
    window._allData = data;
    renderLinks(data);
  } catch (err) {
    console.error('加载 links.json 失败：', err);
    document.getElementById('content').innerHTML = '<p style="color:#999;text-align:center;padding:3rem;">链接数据加载失败</p>';
  }
})();
</script>
</body>
</html>
