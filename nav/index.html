<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>王五导航</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bgLayer"></div>
<div id="bgOverlay"></div>

<!-- 左上：天气 -->
<div class="widget-corner" id="widget-tl">
  <div class="widget-box" id="weather-widget">
    <div id="weather-main">
      <span id="weather-icon">🌤</span>
      <div id="weather-right">
        <span id="weather-temp">--°C</span>
        <span id="weather-city-wrap">
          <span id="weather-city" title="点击修改城市">长春</span>
          <input id="weather-city-input" type="text" placeholder="输入城市名" style="display:none;">
        </span>
      </div>
    </div>
    <div id="weather-desc">加载中…</div>
  </div>
</div>

<!-- 左下：格言 -->
<div class="widget-corner" id="widget-bl">
  <div class="widget-box" id="quote-widget" title="点击换一条">
    <span id="quote-text">加载中…</span>
    <span id="quote-from"></span>
  </div>
</div>

<!-- 右下：音乐播放器 -->
<div class="widget-corner" id="widget-br">
  <div class="widget-box" id="music-widget">
    <!-- 折叠头部（移动端点击展开/收起） -->
    <div id="music-header">
      <img id="music-cover" src="" alt="封面">
      <div id="music-meta">
        <div id="music-title">未播放</div>
        <div id="music-artist"></div>
      </div>
      <button id="music-collapse-btn" title="折叠/展开">▼</button>
    </div>
    <!-- 可折叠内容 -->
    <div id="music-body">
      <div id="music-controls">
        <button class="music-btn" id="music-prev" title="上一首">⏮</button>
        <button class="music-btn" id="music-play" title="播放/暂停">▶</button>
        <button class="music-btn" id="music-next" title="下一首">⏭</button>
        <div id="music-progress-wrap">
          <div id="music-progress-bar"></div>
        </div>
        <span id="music-time">0:00</span>
      </div>
      <div id="music-vol-row">
        <span id="music-vol-icon">🔈</span>
        <input type="range" id="music-volume" min="0" max="1" step="0.05" value="0.7">
      </div>
      <button id="music-list-btn">▤ 歌单列表</button>
      <div id="music-list-panel"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="header-area">
    <span class="header-icon" id="icon-sun" title="切换夜间模式" style="cursor:pointer;">☀️</span>
    <div>
      <h1 id="site-title" title="点击切换模式" style="cursor:pointer;">王五导航</h1>
    </div>
    <span class="header-icon" id="icon-moon" title="切换夜间模式" style="cursor:pointer;">🌙</span>
  </div>

  <!-- 标题下方天气行（移动端显示） -->
  <div id="weather-inline" style="display:none;text-align:center;margin:-0.8rem 0 1rem;font-size:0.8rem;color:rgba(255,255,255,0.7);"></div>
  <div class="search-wrapper">
    <div class="search-tabs" id="searchTabs"></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索网页 / 定位站内网站" autocomplete="off"
             oninput="filterLinks(); handleSugInput(this.value)" />
      <button class="clear-btn" id="clearBtn" aria-label="清空" style="display:none;" onclick="clearSearch()">✕</button>
      <button class="search-submit-btn" onclick="doSearch()" aria-label="搜索">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <ul id="sug-list"></ul>
    </div>
    <div class="engine-list" id="enginePanel"></div>
  </div>

  <div id="main-content"></div>
</div>

<audio id="bg-audio" preload="none"></audio>

<script src="main.js"></script>
<script>
/* ===== 夜间模式 ===== */
(function(){
  const sunEl = document.getElementById('icon-sun');
  const moonEl = document.getElementById('icon-moon');
  const KEY = 'nav_dark_mode';
  function applyDark(on){
    document.body.classList.toggle('dark-mode', on);
    sunEl.textContent  = on ? '🌤' : '☀️';
    moonEl.textContent = on ? '⭐' : '🌙';
    localStorage.setItem(KEY, on ? '1' : '0');
  }
  sunEl.addEventListener('click',  () => applyDark(!document.body.classList.contains('dark-mode')));
  moonEl.addEventListener('click', () => applyDark(!document.body.classList.contains('dark-mode')));
  applyDark(localStorage.getItem(KEY) === '1');
})();

/* ===== 天气（支持自定义城市） ===== */
(function(){
  const iconEl  = document.getElementById('weather-icon');
  const tempEl  = document.getElementById('weather-temp');
  const descEl  = document.getElementById('weather-desc');
  const cityEl  = document.getElementById('weather-city');
  const inputEl = document.getElementById('weather-city-input');
  const CITY_KEY = 'nav_weather_city';
  const COORD_KEY = 'nav_weather_coord';

  function wIcon(c){if(c===0)return'☀️';if(c<=2)return'🌤';if(c===3)return'☁️';if(c<=49)return'🌫';if(c<=59)return'🌦';if(c<=69)return'🌧';if(c<=79)return'❄️';if(c<=84)return'🌧';if(c<=99)return'⛈';return'🌈';}
  function wText(c){if(c===0)return'晴';if(c<=2)return'少云';if(c===3)return'阴';if(c<=49)return'雾';if(c<=59)return'毛毛雨';if(c<=69)return'雨';if(c<=79)return'雪';if(c<=84)return'阵雨';if(c<=99)return'雷雨';return'未知';}

  async function fetchWeather(lat, lon, cityName){
    const res  = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FShanghai&forecast_days=1`);
    const d    = await res.json();
    const code = d.current.weathercode, t = Math.round(d.current.temperature_2m);
    const tmax = Math.round(d.daily.temperature_2m_max[0]), tmin = Math.round(d.daily.temperature_2m_min[0]);
    const humid = d.current.relative_humidity_2m;
    const icon  = wIcon(code), desc = `${wText(code)}  ${tmin}~${tmax}°C  💧${humid}%`;
    iconEl.textContent = icon; tempEl.textContent = t+'°C'; descEl.textContent = desc;
    cityEl.textContent = cityName;
    sessionStorage.setItem('wx_nav', JSON.stringify({icon, temp:t+'°C', desc, city:cityName, ts:Date.now()}));
  }

  async function geocodeCity(name){
    descEl.textContent = '定位中…';
    const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=zh&format=json`);
    const data = await res.json();
    if(!data.results || !data.results.length) throw new Error('城市未找到');
    const r = data.results[0];
    const coord = { lat: r.latitude, lon: r.longitude, name: r.name };
    localStorage.setItem(CITY_KEY, r.name);
    localStorage.setItem(COORD_KEY, JSON.stringify(coord));
    return coord;
  }

  async function init(){
    const cached = sessionStorage.getItem('wx_nav');
    if(cached){ try{ const o=JSON.parse(cached); if(Date.now()-o.ts<5*60*1000){ iconEl.textContent=o.icon; tempEl.textContent=o.temp; descEl.textContent=o.desc; cityEl.textContent=o.city||'长春'; return; } }catch{} }
    const savedCoord = localStorage.getItem(COORD_KEY);
    const savedCity  = localStorage.getItem(CITY_KEY) || '长春';
    if(savedCoord){
      try{ const c=JSON.parse(savedCoord); await fetchWeather(c.lat, c.lon, c.name||savedCity); return; }catch{}
    }
    await fetchWeather(43.8868, 125.3245, '长春').catch(()=>{ descEl.textContent='获取失败'; });
  }

  /* ── 修复②：城市点击编辑，同时绑 click + touchend，兼容移动端 ── */
  function openCityEdit() {
    inputEl.value = cityEl.textContent;
    cityEl.style.display = 'none';
    inputEl.style.display = 'inline-block';
    // 延迟 focus，兼容 iOS Safari 的虚拟键盘弹出时序
    setTimeout(() => inputEl.focus(), 50);
  }
  cityEl.addEventListener('click', openCityEdit);
  cityEl.addEventListener('touchend', function(e) {
    e.preventDefault(); // 阻止 300ms 延迟 & ghost click
    openCityEdit();
  });

  async function confirmCity(){
    const name = inputEl.value.trim();
    inputEl.style.display = 'none';
    cityEl.style.display  = 'inline';
    if(!name) return;
    try{
      sessionStorage.removeItem('wx_nav');
      const coord = await geocodeCity(name);
      await fetchWeather(coord.lat, coord.lon, coord.name);
    } catch(e){ descEl.textContent='城市未找到'; cityEl.textContent=localStorage.getItem(CITY_KEY)||'长春'; }
  }

  inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') confirmCity(); if(e.key==='Escape'){ inputEl.style.display='none'; cityEl.style.display='inline'; } });
  inputEl.addEventListener('blur', confirmCity);

  function syncInlineWeather(){
    const el = document.getElementById('weather-inline');
    if(!el) return;
    if(window.innerWidth <= 600){
      el.style.display = 'block';
      el.textContent = iconEl.textContent + ' ' + tempEl.textContent + '  ' + cityEl.textContent + '  ' + descEl.textContent;
    } else {
      el.style.display = 'none';
    }
  }

  const origFetch = fetchWeather;
  fetchWeather = async function(...args){
    await origFetch(...args);
    syncInlineWeather();
  };

  window.addEventListener('resize', syncInlineWeather);
  init().then(syncInlineWeather).catch(()=>{});
})();

/* ===== 格言 ===== */
(function(){
  let quotes=[], idx=-1;
  const tEl=document.getElementById('quote-text'), fEl=document.getElementById('quote-from');
  function show(){ if(!quotes.length)return; let ni; do{ ni=Math.floor(Math.random()*quotes.length); }while(ni===idx&&quotes.length>1); idx=ni; const q=quotes[idx]; tEl.textContent=q.text||''; fEl.textContent=q.from?'——'+q.from:''; }
  fetch('../quotes.json').then(r=>r.json()).then(d=>{ quotes=d; show(); }).catch(()=>{ tEl.textContent=''; });
  document.getElementById('quote-widget').addEventListener('click', show);
})();

/* ===== 百度联想词 ===== */
(function(){
  const input   = document.getElementById('searchInput');
  const sugList = document.getElementById('sug-list');
  let timer=null, cbIdx=0;
  function hideSug(){ sugList.innerHTML=''; sugList.style.display='none'; }
  window.handleSugInput = function(val){
    clearTimeout(timer);
    if(!val.trim()){ hideSug(); return; }
    timer = setTimeout(()=> fetchSug(val), 200);
  };
  function fetchSug(kw){
    const cbName='__baiduSug'+(cbIdx++);
    const script=document.createElement('script');
    window[cbName]=function(data){ delete window[cbName]; document.head.removeChild(script); renderSug(data.s||[]); };
    script.onerror=function(){ delete window[cbName]; try{document.head.removeChild(script);}catch{} hideSug(); };
    script.src=`https://suggestion.baidu.com/su?wd=${encodeURIComponent(kw)}&cb=${cbName}`;
    document.head.appendChild(script);
  }
  function renderSug(list){
    sugList.innerHTML='';
    const items=list.slice(0,4);
    if(!items.length){ hideSug(); return; }
    items.forEach(word=>{
      const li=document.createElement('li');
      li.textContent=word;
      li.addEventListener('mousedown',e=>{ e.preventDefault(); input.value=word; hideSug(); doSearch(); });
      sugList.appendChild(li);
    });
    sugList.style.display='block';
  }
  document.addEventListener('click', e=>{ if(!e.target.closest('.search-box')) hideSug(); });
  input.addEventListener('keydown', e=>{ if(e.key==='Escape') hideSug(); if(e.key==='Enter') hideSug(); });
})();

/* ===== 音乐播放器 ===== */
(function(){
  const CUSTOM_PLAYLIST = [
    // { name:'歌曲名', artist:'歌手', cover:'封面URL', url:'音频URL' },
  ];

  const MUSIC_API = 'https://a.aa.cab/wy_rege.api';

  const audio        = document.getElementById('bg-audio');
  const playBtn      = document.getElementById('music-play');
  const prevBtn      = document.getElementById('music-prev');
  const nextBtn      = document.getElementById('music-next');
  const titleEl      = document.getElementById('music-title');
  const artistEl     = document.getElementById('music-artist');
  const coverEl      = document.getElementById('music-cover');
  const progressBar  = document.getElementById('music-progress-bar');
  const progressWrap = document.getElementById('music-progress-wrap');
  const timeEl       = document.getElementById('music-time');
  const volInput     = document.getElementById('music-volume');
  const volIcon      = document.getElementById('music-vol-icon');
  const listBtn      = document.getElementById('music-list-btn');
  const listPanel    = document.getElementById('music-list-panel');
  const collapseBtn  = document.getElementById('music-collapse-btn');
  const musicBody    = document.getElementById('music-body');

  let playlist = [...CUSTOM_PLAYLIST];
  let cur = 0, muted = false, loading = false;

  /* ── 修复③：先声明 collapsed，再根据屏幕决定初始值 ── */
  let collapsed = window.innerWidth <= 600;
  if (collapsed) {
    musicBody.style.display = 'none';
    collapseBtn.textContent = '▲';
  }

  const useCustom = CUSTOM_PLAYLIST.length > 0;

  /* 折叠/展开 */
  collapseBtn.addEventListener('click', ()=>{
    collapsed = !collapsed;
    musicBody.style.display  = collapsed ? 'none' : '';
    collapseBtn.textContent  = collapsed ? '▲' : '▼';
  });

  function fmt(s){ const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

  async function fetchRandom(){
    const res  = await fetch(MUSIC_API);
    const data = await res.json();
    if(!data || data.code !== 0 || !data.data) throw new Error('接口异常');
    const d = data.data;
    const musicUrl = (d.url||'').replace(/^http:\/\//, 'https://');
    const coverUrl = (d.pic||'').replace(/^http:\/\//, 'https://');
    return { name: d.name||'未知歌曲', artist: d.singer||'', cover: coverUrl, url: musicUrl };
  }

  function renderList(){
    listPanel.innerHTML='';
    playlist.forEach((t,i)=>{
      const div=document.createElement('div');
      div.className='music-list-item'+(i===cur?' active':'');
      div.innerHTML=`<img class="music-list-item-cover" src="${t.cover||''}" onerror="this.style.display='none'" alt=""><span class="music-list-item-name">${t.name||'音轨'+(i+1)}</span>`;
      div.addEventListener('click',()=>{ cur=i; playTrack(playlist[i]); renderList(); });
      listPanel.appendChild(div);
    });
  }

  function playTrack(t){
    if(!t.url){ nextTrack(); return; }
    audio.src=t.url;
    titleEl.textContent  = t.name   || '未知歌曲';
    artistEl.textContent = t.artist || '';
    if(t.cover){ coverEl.src=t.cover; coverEl.style.display='block'; }
    else        { coverEl.src='';     coverEl.style.display='none';  }
    audio.load();
    audio.play().catch(()=>{});
  }

  function loadIndex(i){
    cur=(i+playlist.length)%playlist.length;
    playTrack(playlist[cur]); renderList();
  }

  async function nextTrack(){
    if(loading) return;
    if(useCustom){ loadIndex(cur+1); return; }
    loading=true;
    titleEl.textContent='加载中…'; artistEl.textContent='';
    coverEl.style.display='none';
    try{
      const t=await fetchRandom();
      playlist.push(t); cur=playlist.length-1;
      playTrack(t); renderList();
    } catch(e){
      titleEl.textContent='加载失败，重试中…';
      setTimeout(nextTrack, 2000);
    } finally{ loading=false; }
  }

  function prevTrack(){
    if(useCustom){ loadIndex(cur-1); return; }
    if(cur>0){ cur--; playTrack(playlist[cur]); renderList(); }
    else nextTrack();
  }

  function togglePlay(){
    if(!audio.src||audio.src===window.location.href){ nextTrack(); return; }
    audio.paused ? audio.play() : audio.pause();
  }

  audio.addEventListener('play',  ()=>{ playBtn.textContent='⏸'; coverEl.classList.add('spinning'); });
  audio.addEventListener('pause', ()=>{ playBtn.textContent='▶'; coverEl.classList.remove('spinning'); });
  audio.addEventListener('ended', ()=> nextTrack());
  audio.addEventListener('timeupdate', ()=>{
    if(audio.duration) progressBar.style.width=(audio.currentTime/audio.duration*100)+'%';
    timeEl.textContent=fmt(audio.currentTime)+(audio.duration?' / '+fmt(audio.duration):'');
  });
  progressWrap.addEventListener('click', e=>{
    if(!audio.duration) return;
    const r=progressWrap.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
  });

  volInput.value=audio.volume=0.7;
  volInput.addEventListener('input',()=>{ audio.volume=parseFloat(volInput.value); muted=audio.volume===0; volIcon.textContent=muted?'🔇':'🔈'; });
  volIcon.addEventListener('click',()=>{ muted=!muted; audio.volume=muted?0:parseFloat(volInput.value)||0.7; volIcon.textContent=muted?'🔇':'🔈'; });

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', prevTrack);
  nextBtn.addEventListener('click', nextTrack);
  listBtn.addEventListener('click',()=>{
    listPanel.classList.toggle('open');
    listBtn.textContent=listPanel.classList.contains('open')?'▲ 收起列表':'▤ 歌单列表';
  });

  if(useCustom){
    titleEl.textContent=CUSTOM_PLAYLIST[0].name||'音轨 1';
    artistEl.textContent=CUSTOM_PLAYLIST[0].artist||'';
    if(CUSTOM_PLAYLIST[0].cover) coverEl.src=CUSTOM_PLAYLIST[0].cover;
    renderList();
  } else {
    titleEl.textContent='点击 ▶ 开始播放';
    artistEl.textContent='网易云随机';
  }
})();
</script>
</body>
</html>
