<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
        minimum-scale=1.0, maximum-scale=1.0,
        user-scalable=no" />

  <title>王五导航 · WebStack</title>

  <!-- favicon -->
  <link rel="shortcut icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/block-library.min-5.6.2.css" />
  <link rel="stylesheet" href="assets/css/iconfont-3.03029.1.css" />
  <link rel="stylesheet" href="assets/css/bootstrap.min-4.3.1.css" />
  <link rel="stylesheet" href="assets/css/style-3.03029.1.css" />
  <link rel="stylesheet" href="assets/css/custom-style.css" />
  <link rel="stylesheet" href="assets/fontawesome-5.15.4/css/all.min.css" />

  <script src="assets/js/jquery.min-3.2.1.js"></script>

  <style>

    /* =========================
       Logo
    ========================= */

    .sidebar-logo{
      padding:12px 16px!important;
      min-height:70px;
      display:flex;
      align-items:center;
    }

    .logo-title-link{
      cursor:pointer;
      text-decoration:none!important;
      display:block;
    }

    .logo-title-link:hover{
      opacity:.8;
    }

    .logo-title-text{
      font-size:1.5rem;
      font-weight:900;
      letter-spacing:.06em;
      line-height:1.2;
      display:block;
      white-space:nowrap;
    }

    .logo-title-sub{
      font-size:.58rem;
      letter-spacing:.1em;
      opacity:.5;
      display:block;
      margin-top:2px;
      text-transform:uppercase;
      white-space:nowrap;
    }

    /* mini sidebar logo */
    body.mini-sidebar .logo-expanded{
      display:none!important;
    }

    body.mini-sidebar .logo-collapsed{
      display:block!important;
    }

    /* =========================
       Banner
    ========================= */

    .header-big{
      position:relative;
      padding:32px 0 24px;
      text-align:center;
      background:linear-gradient(
        135deg,
        #2c3e50 0%,
        #3a5068 50%,
        #2c3e50 100%
      );
      min-height:160px;
    }

    .s-search{
      max-width:640px;
      margin:0 auto;
      padding:0 20px;
    }

    /* =========================
       分类 Tabs
    ========================= */

    .s-type-list.big{
      display:flex;
      gap:4px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .s-type-list.big label{
      padding:5px 18px;
      border-radius:18px;
      cursor:pointer;
      font-size:.88rem;
      font-weight:600;
      color:rgba(255,255,255,.6);
      transition:all .18s;
      user-select:none;
      margin:0;
    }

    .s-type-list.big label:hover{
      color:#fff;
    }

    .s-type-list.big label.active{
      color:#fff;
      background:rgba(255,255,255,.18);
    }

    /* =========================
       搜索框
    ========================= */

    .super-search-fm{
      display:flex;
      align-items:center;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.3);
      border-radius:6px;
      padding:0 12px 0 16px;
      gap:10px;
      transition:border-color .2s, background .2s;
    }

    .super-search-fm:focus-within{
      background:rgba(255,255,255,.2);
      border-color:rgba(255,255,255,.55);
    }

    .super-search-fm .search-key{
      flex:1;
      background:transparent!important;
      border:none!important;
      box-shadow:none!important;
      color:#fff!important;
      font-size:1rem;
      padding:12px 4px;
      height:auto;
    }

    .super-search-fm .search-key::placeholder{
      color:rgba(255,255,255,.45);
    }

    .super-search-fm .submit{
      background:none;
      border:none;
      color:rgba(255,255,255,.7);
      font-size:1.2rem;
      cursor:pointer;
      padding:4px 6px;
      display:flex;
      align-items:center;
    }

    .super-search-fm .submit:hover{
      color:#fff;
    }

    /* =========================
       引擎选择器
    ========================= */

    .ws-engine-trigger{
      display:flex;
      align-items:center;
      gap:5px;
      background:none;
      border:none;
      color:rgba(255,255,255,.85);
      font-size:.82rem;
      font-weight:600;
      cursor:pointer;
      padding:8px 4px 8px 0;
      white-space:nowrap;
      flex-shrink:0;
    }

    .ws-engine-trigger img{
      width:16px;
      height:16px;
      border-radius:3px;
    }

    .ws-divider{
      width:1px;
      height:18px;
      background:rgba(255,255,255,.25);
      flex-shrink:0;
    }

    /* =========================
       引擎面板
    ========================= */

    #search-list{
      margin-top:12px;
    }

    .search-type{
      list-style:none;
      padding:0;
      margin:0;
      display:flex;
      flex-wrap:wrap;
      gap:4px;
      justify-content:center;
    }

    .search-type li label{
      padding:4px 14px;
      border-radius:14px;
      cursor:pointer;
      font-size:.8rem;
      font-weight:600;
      color:rgba(255,255,255,.6);
    }

    .search-type li label:hover{
      color:#fff;
      background:rgba(255,255,255,.12);
    }

    .search-type li input[type=radio]{
      display:none;
    }

    .search-type li input[type=radio]:checked + label{
      color:#fff;
      background:rgba(255,255,255,.22);
    }

    /* =========================
       卡片
    ========================= */

    .url-img{
      width:48px!important;
      height:48px!important;
      flex-shrink:0;
    }

    .url-img img{
      width:36px!important;
      height:36px!important;
      border-radius:8px;
      object-fit:contain;
    }

    .url-card .card{
      border-radius:10px;
    }

    .overflowClip_1{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    /* =========================
       内容区
    ========================= */

    .content-wrap{
      min-height:100vh;
    }

  </style>
</head>

<body class="io-grey-mode mini-sidebar">

<div class="page-container">

  <!-- Sidebar -->
  <div id="sidebar" class="sticky sidebar-nav fade">

    <div class="modal-dialog h-100 sidebar-nav-inner">

      <div class="sidebar-logo border-bottom border-color">

        <div class="logo overflow-hidden">

          <a class="logo-expanded logo-title-link"
             onclick="switchToMain()">

            <span class="logo-title-text">
              王五导航
            </span>

            <span class="logo-title-sub">
              click to switch
            </span>

          </a>

          <a class="logo-collapsed logo-title-link"
             onclick="switchToMain()">

            <span class="logo-title-text">
              W5
            </span>

          </a>

        </div>

      </div>

      <div class="sidebar-menu flex-fill">
        <div class="sidebar-scroll">
          <div class="sidebar-menu-inner">
            <ul id="main-menu"></ul>
          </div>
        </div>
      </div>

      <div class="border-top py-2 border-color">

        <div class="flex-bottom">

          <ul>

            <li class="sidebar-item">

              <a onclick="switchToMain()"
                 style="cursor:pointer;">

                <i class="fas fa-exchange-alt icon-fw icon-lg mr-2"></i>

                <span>切换主题</span>

              </a>

            </li>

          </ul>

        </div>

      </div>

    </div>

  </div>

  <!-- 主内容 -->
  <div id="content-wrap" class="content-wrap">

    <!-- 搜索 -->
    <div class="header-big post-top css-color mb-4">

      <div class="s-search">

        <div class="s-type text-center">
          <div class="s-type-list big" id="ws-tabs"></div>
        </div>

        <!-- 搜索框 -->

      </div>

    </div>

    <!-- 内容 -->
    <div id="content"
         class="content-site customize-site container-fluid">

      <p style="color:#999;text-align:center;padding:3rem;">
        加载中...
      </p>

    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>

<script src="assets/js/bootstrap.min-4.3.1.js"></script>
<script src="assets/js/lazyload.min-12.4.0.js"></script>
<script src="assets/js/app-mini.js"></script>

<script src="main.js"></script>

</body>
</html>
