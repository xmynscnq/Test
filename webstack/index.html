<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>王五导航 · WebStack</title>
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />
  <link rel="stylesheet" href="assets/css/block-library.min-5.6.2.css" />
  <link rel="stylesheet" href="assets/css/iconfont-3.03029.1.css" />
  <link rel="stylesheet" href="assets/css/bootstrap.min-4.3.1.css" />
  <link rel="stylesheet" href="assets/css/style-3.03029.1.css" />
  <link rel="stylesheet" href="assets/css/custom-style.css" />
  <link rel="stylesheet" href="assets/fontawesome-5.15.4/css/all.min.css" />
  <script src="assets/js/jquery.min-3.2.1.js"></script>
  <script src="assets/js/content-search.js"></script>

  <style>
    /* ── 侧边栏 logo 区域 ── */
    .sidebar-logo {
      padding: 12px 16px !important;
      min-height: 70px;
      display: flex;
      align-items: center;
    }
    .logo-title-link {
      cursor: pointer;
      text-decoration: none !important;
      display: block;
    }
    .logo-title-link:hover { opacity: 0.8; }
    .logo-title-text {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1.2;
      display: block;
    }
    .logo-title-sub {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
      display: block;
      margin-top: 2px;
      text-transform: uppercase;
    }
    /* 折叠时只显示简写 */
    .mini-sidebar .logo-expanded { display: none !important; }
    .mini-sidebar .logo-collapsed { display: block !important; }
    .sidebar-nav:not(.mini-sidebar) .logo-collapsed { display: none !important; }
    .sidebar-nav:not(.mini-sidebar) .logo-expanded { display: block !important; }
    .logo-collapsed .logo-title-text { font-size: 1rem; }

    /* ── 顶部 banner 搜索区 ── */
    .header-big {
      position: relative;
      padding: 28px 0 20px;
      text-align: center;
    }
    .s-search {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* 分类 Tab */
    .s-type-list.big {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .s-type-list.big label {
      padding: 4px 16px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      transition: all 0.18s;
      user-select: none;
      margin: 0;
    }
    .s-type-list.big label:hover { color: #fff; }
    .s-type-list.big label.active {
      color: #fff;
      background: rgba(255,255,255,0.18);
    }

    /* 搜索框 */
    .super-search-fm {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 0 10px 0 14px;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s;
    }
    .super-search-fm:focus-within {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
    }
    .super-search-fm .search-key {
      flex: 1;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #fff !important;
      font-size: 0.95rem;
      padding: 10px 4px;
      height: auto;
    }
    .super-search-fm .search-key::placeholder { color: rgba(255,255,255,0.45); }
    .super-search-fm .submit {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      transition: color 0.2s;
      display: flex; align-items: center;
    }
    .super-search-fm .submit:hover { color: #fff; }

    /* 引擎选择器（搜索框左侧） */
    .ws-engine-trigger {
      display: flex; align-items: center; gap: 4px;
      background: none; border: none;
      color: rgba(255,255,255,0.85);
      font-size: 0.8rem; font-weight: 600;
      font-family: inherit;
      cursor: pointer; padding: 6px 4px 6px 0;
      flex-shrink: 0; white-space: nowrap;
      transition: color 0.15s;
    }
    .ws-engine-trigger:hover { color: #fff; }
    .ws-engine-trigger img { width: 14px; height: 14px; border-radius: 2px; }
    .ws-engine-trigger .arrow { font-size: 0.6rem; opacity: 0.5; transition: transform 0.2s; }

    .ws-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.25); flex-shrink: 0; }

    /* 引擎面板 */
    .search-group { display: none; }
    .search-group.active { display: block; }
    #search-list {
      margin-top: 10px;
    }
    .search-type {
      list-style: none;
      padding: 0; margin: 0;
      display: flex; flex-wrap: wrap;
      gap: 4px; justify-content: center;
    }
    .search-type li label {
      padding: 3px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      transition: all 0.15s;
      margin: 0;
      user-select: none;
    }
    .search-type li label:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .search-type li input[type=radio]:checked + label {
      color: #fff;
      background: rgba(255,255,255,0.22);
    }
    .search-type li input[type=radio] { display: none; }

    /* 卡片区 */
    .url-card .card { border-radius: 8px; }
  </style>
</head>

<body class="io-grey-mode">
<div class="page-container">

  <!-- 左侧边栏 -->
  <div id="sidebar" class="sticky sidebar-nav fade mini-sidebar" style="width:60px;">
    <div class="modal-dialog h-100 sidebar-nav-inner">
      <div class="sidebar-logo border-bottom border-color">
        <div class="logo overflow-hidden">
          <a class="logo-expanded logo-title-link" onclick="switchToMain()">
            <span class="logo-title-text">王五导航</span>
            <span class="logo-title-sub">click to switch</span>
          </a>
          <a class="logo-collapsed logo-title-link" onclick="switchToMain()">
            <span class="logo-title-text">W5</span>
          </a>
        </div>
      </div>

      <div class="sidebar-menu flex-fill">
        <div class="sidebar-scroll">
          <div class="sidebar-menu-inner">
            <ul id="main-menu"></ul>
          </div>
        </div>
      </div>

      <div class="border-top py-2 border-color">
        <div class="flex-bottom">
          <ul>
            <li class="sidebar-item">
              <a onclick="switchToMain()" style="cursor:pointer;">
                <i class="fas fa-exchange-alt icon-fw icon-lg mr-2"></i>
                <span>切换主题</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div id="content-wrap" class="content-wrap">

    <!-- 顶部搜索 banner -->
    <div class="header-big post-top css-color mb-4" id="search-bg">
      <div class="s-search">
        <!-- 分类 Tab -->
        <div class="s-type text-center">
          <div class="s-type-list big" id="ws-tabs"></div>
        </div>

        <!-- 搜索框 -->
        <form class="super-search-fm" onsubmit="doSearch(event)">
          <button type="button" class="ws-engine-trigger" id="ws-engine-trigger" onclick="toggleEnginePanel()">
            <img id="ws-engine-icon" src="" alt="" onerror="this.style.display='none'">
            <span id="ws-engine-name"></span>
            <span class="arrow" id="ws-engine-arrow">▾</span>
          </button>
          <div class="ws-divider"></div>
          <input type="text" id="search-text" class="form-control search-key"
                 placeholder="搜索网页 / 定位站内网站"
                 autocomplete="off"
                 oninput="onSearchInput()"
                 onkeydown="onSearchKeydown(event)" />
          <button class="submit" type="submit">
            <i class="iconfont icon-search"></i>
          </button>
        </form>

        <!-- 引擎列表 -->
        <div id="search-list" style="display:none;"></div>
      </div>
    </div>

    <!-- 链接内容区 -->
    <div id="content" class="content-site customize-site">
      <p style="color:#999;text-align:center;padding:3rem;">加载中...</p>
    </div>

  </div><!-- end content-wrap -->
</div><!-- end page-container -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="assets/js/bootstrap.min-4.3.1.js"></script>
<script src="assets/js/lazyload.min-17.8.3.js"></script>
<script src="main.js"></script>
</body>
</html>
