    const PROTECTED_PASSWORD_HASH =

async function sha256(str) {
  const buf = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(str)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

    /* ── 模式切换区（navbar 内横排） ── */
    #mode-switcher {
      display: none; /* JS 控制 open 状态 */
      align-items: center;
      gap: 4px;
      margin-left: 10px;
      flex-wrap: nowrap;

    #mode-switcher.open { display: flex; }

    .mode-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      transition: background 0.15s, transform 0.1s;
      color: #333;
    }
    .mode-pill:hover {
      background: rgba(255,255,255,1);
      transform: translateY(-1px);
      color: #111;
    }
    .mode-pill.cur {
      background: rgba(255,255,255,1);
      border-color: rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);

    .mode-pill .pill-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;

      display: none;

    .mode-mobile-item {

  webstack: { label: 'WebStack', desc: '侧栏导航',  icon: '📐', color: '#1677ff' },

/* ══ 模式切换菜单 ══ */
let _menuOpen = false;
const isMobileWidth = () => window.innerWidth < 768;

function buildMenus() {
  /* PC 横排胶囊 */
  const sw = document.getElementById('mode-switcher');
  sw.innerHTML = '';
  MODES.forEach(key => {
    const m = MODE_META[key];
    const a = document.createElement('a');
    a.href = MODE_PATHS[key];
    a.className = 'mode-pill' + (key === CURRENT_MODE ? ' cur' : '');
    a.innerHTML = `
      <span class="pill-dot" style="background:${m.color}"></span>
      ${m.icon} ${m.label}
      ${key === CURRENT_MODE ? '<span class="pill-check">✓</span>' : ''}
    `;
    sw.appendChild(a);
  });

  /* 手机竖列菜单 */
  const mm = document.getElementById('mode-menu-mobile');
  mm.innerHTML = '';
  MODES.forEach(key => {
    const m = MODE_META[key];
    const a = document.createElement('a');
    a.href = MODE_PATHS[key];
    a.className = 'mode-mobile-item' + (key === CURRENT_MODE ? ' cur' : '');
    a.innerHTML = `
      <span class="mi-dot" style="background:${m.color}"></span>
      <span class="mi-icon" style="font-size:14px">${m.icon}</span>
      <span style="display:flex;flex-direction:column;gap:1px">
        <span class="mi-label">${m.label}</span>
        <span class="mi-desc">${m.desc}</span>
      </span>
      <span class="mi-check">${key === CURRENT_MODE ? '✓' : ''}</span>
    `;
    mm.appendChild(a);
  });
}

function positionMobileMenu() {
  const titleEl = document.getElementById('brand-title');
  const mm = document.getElementById('mode-menu-mobile');
  if (!titleEl || !mm) return;
  const rect = titleEl.getBoundingClientRect();
  const menuW = Math.min(180, window.innerWidth - 24);
  let left = rect.left;
  left = Math.max(12, Math.min(left, window.innerWidth - menuW - 12));
  mm.style.top     = (rect.bottom + 8) + 'px';
  mm.style.left    = left + 'px';
  mm.style.width   = menuW + 'px';
}

function openMenu() {
  _menuOpen = true;
  if (isMobileWidth()) {
    positionMobileMenu();
    document.getElementById('mode-menu-mobile').classList.add('open');
  } else {
    document.getElementById('mode-switcher').classList.add('open');
  }
}

function closeMenu() {
  _menuOpen = false;
  document.getElementById('mode-switcher').classList.remove('open');
  document.getElementById('mode-menu-mobile').classList.remove('open');
}

function toggleMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  _menuOpen ? closeMenu() : openMenu();
}

document.addEventListener('click', (e) => {
  const sw = document.getElementById('mode-switcher');
  const mm = document.getElementById('mode-menu-mobile');
  const title = document.getElementById('brand-title');
  if (!sw.contains(e.target) && !mm.contains(e.target) && e.target !== title) {
    closeMenu();
  }
});

window.addEventListener('resize', () => {
  if (_menuOpen) {
    closeMenu();
  }
});

function renderEngines() {
  const ul = document.getElementById('search-type-ul');
  if (!ul) return;
  ul.innerHTML = '';
  ENGINES.forEach((engine, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<input ${i===0?'checked':''} hidden type="radio" name="type" id="type-${i}" value="${engine.url}" data-placeholder="${engine.placeholder}"><label for="type-${i}">${engine.name}</label>`;
    ul.appendChild(li);
  });
  ul.querySelectorAll('input[type=radio]').forEach(input => {
    input.addEventListener('change', () => {
      document.getElementById('search-text').placeholder = input.dataset.placeholder;
      document.getElementById('search-text').focus();
    });
  });
}

function doSearch(e) {
  if (e) e.preventDefault();
  const kw = document.getElementById('search-text')?.value.trim();
  const checked = document.querySelector('#search-type-ul input[type=radio]:checked');
  const url = checked ? checked.value : ENGINES[0].url;
  if (kw) window.open(url + encodeURIComponent(kw), '_blank');
}

function updateNetBtn() {
  const btn = document.getElementById('net-toggle');
  if (btn) btn.textContent = isIntranet ? '🏠 内网' : '🌐 外网';
}
document.getElementById('net-toggle').addEventListener('click', () => {
  isIntranet = !isIntranet;
  localStorage.setItem('netMode', isIntranet ? 'intranet' : 'internet');
  updateNetBtn();
  if (window._allData) renderLinks(window._allData);
});
updateNetBtn();

/* 标题点击触发菜单 */
document.getElementById('brand-title').addEventListener('click', toggleMenu);

function renderLinks(data) {
  const main = document.getElementById('content');
  if (!main) return;
  main.innerHTML = '';
  data.forEach(({ section, items, protected: isProtected }) => {
    const ul = document.createElement('ul');
    ul.className = 'mylist row';
    const titleLi = document.createElement('li');
    titleLi.className = 'title';
    const titleSpan = document.createElement('span');
    titleSpan.textContent = section;
    titleLi.appendChild(titleSpan);
    ul.appendChild(titleLi);

    const itemsWrapper = document.createElement('div');
    itemsWrapper.style.cssText = 'display:contents';
    if (isProtected) itemsWrapper.style.display = 'none';

    items.forEach(item => {
      const url     = getCardUrl(item);
      const iconSrc = item.icon || faviconSrc(url);
      const title   = (item.title || '').replace(/</g, '&lt;');
      const li = document.createElement('li');
      li.className = 'col-3 col-sm-3 col-md-2 col-lg-1 site-item';
      li.innerHTML = `<a href="${url}" target="_blank"><div class="site-icon-wrap"><img src="${iconSrc}" onerror="this.src='${DEFAULT_ICON}';this.onerror=null;" alt="${title}"></div><span class="site-name">${title}</span></a>`;
      itemsWrapper.appendChild(li);
    });

    if (isProtected) {
      titleSpan.style.cursor = 'pointer';
      titleSpan.addEventListener('click', async () => {
        if (sessionStorage.getItem(section) === 'ok') {
          itemsWrapper.style.display = itemsWrapper.style.display === 'none' ? 'contents' : 'none';
          return;
        }
        const pwd = prompt('请输入访问密码');
        if (!pwd) return;
        const hash = await sha256(pwd);
        if (hash === PROTECTED_PASSWORD_HASH) {
          sessionStorage.setItem(section, 'ok');
          itemsWrapper.style.display = 'contents';
        } else {
          alert('密码错误');
        }
      });
    }

    ul.appendChild(itemsWrapper);
    main.appendChild(ul);
  });
}

(async () => {
  buildMenus();
  renderEngines();
  try {
    const res  = await fetch(LINKS_FILE);
    const data = await res.json();
    window._allData = data;
    renderLinks(data);
  } catch (err) {
    console.error('加载 links.json 失败：', err);
    document.getElementById('content').innerHTML = '<p style="color:#999;text-align:center;padding:3rem;">链接数据加载失败</p>';
  }
})();
</script>
</body>
</html>
