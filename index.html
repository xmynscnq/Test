<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>王五导航</title>
</head>
<body>
<script>
const MODES = ['normal', 'webstack', 'easy', 'nav', '5iux', 'kim'];
const DEFAULT_MODE = 'normal';
const params = new URLSearchParams(location.search);
const urlMode = params.get('mode');
let mode = MODES.includes(urlMode)
  ? urlMode
  : (localStorage.getItem('navMode') || DEFAULT_MODE);
if (!MODES.includes(mode)) mode = DEFAULT_MODE;
if (mode === 'webstack') {
  location.replace('webstack/index.html');
} else if (mode === 'normal') {
  location.replace('normal/index.html');
} else if (mode === 'easy') {
  location.replace('easy/index.html');
} else if (mode === 'nav') {
  location.replace('nav/index.html');
} else if (mode === '5iux') {
  location.replace('5IUX/index.html');
} else if (mode === 'kim') {
  location.replace('kim/index.html');
}
</script>
</body>
</html>
