<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>王五导航 · WebStack</title>
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />
  <link rel="stylesheet" href="assets/css/block-library.min-5.6.2.css" />
  <link rel="stylesheet" href="assets/css/iconfont-3.03029.1.css" />
  <link rel="stylesheet" href="assets/css/bootstrap.min-4.3.1.css" />
  <link rel="stylesheet" href="assets/css/style-3.03029.1.css" />
  <link rel="stylesheet" href="assets/css/custom-style.css" />
  <link rel="stylesheet" href="assets/fontawesome-5.15.4/css/all.min.css" />
  <script src="assets/js/jquery.min-3.2.1.js"></script>

  <style>
    /* ══════════════════════════════════════
       侧边栏 Logo
    ══════════════════════════════════════ */
    .sidebar-logo { padding: 12px 16px !important; min-height: 70px; display: flex; align-items: center; }
    .logo-title-link { cursor: pointer; text-decoration: none !important; display: block; }
    .logo-title-link:hover { opacity: 0.8; }
    .logo-title-text { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.06em; line-height: 1.2; display: block; }
    .logo-title-sub { font-size: 0.58rem; letter-spacing: 0.1em; opacity: 0.5; display: block; margin-top: 2px; text-transform: uppercase; }

    /* ══════════════════════════════════════
       Banner 背景
       背景图优先用 --banner-bg-image（由 JS 注入）
       fallback 到深色渐变
    ══════════════════════════════════════ */
    .header-big {
      position: relative;
      padding: 36px 0 28px;
      text-align: center;
      min-height: 200px;
      overflow: hidden;

      /* fallback 渐变 */
      background: linear-gradient(135deg, #1a2a3a 0%, #0f3460 50%, #1a2a3a 100%);
    }

    /* 背景图层（通过 JS 设置 src 后显示） */
    .header-big .banner-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 0;
    }
    .header-big .banner-bg.loaded { opacity: 1; }

    /* 半透明遮罩，让文字可读 */
    .header-big .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(10,20,35,0.55) 0%,
        rgba(10,20,35,0.45) 60%,
        rgba(10,20,35,0.65) 100%);
      z-index: 1;
    }

    .s-search {
      position: relative;
      z-index: 2;
      max-width: 660px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ══════════════════════════════════════
       分类 Tab
    ══════════════════════════════════════ */
    .s-type-list.big {
      display: flex; gap: 4px;
      justify-content: center; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .s-type-list.big label {
      padding: 5px 20px; border-radius: 20px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600;
      color: rgba(255,255,255,0.6);
      transition: all 0.18s; user-select: none; margin: 0;
      border: 1px solid transparent;
    }
    .s-type-list.big label:hover { color: #fff; }
    .s-type-list.big label.active {
      color: #fff;
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.25);
    }

    /* ══════════════════════════════════════
       搜索框 — 白底黑字，大圆角（对标图1）
    ══════════════════════════════════════ */
    .super-search-fm {
      display: flex; align-items: center;
      background: #fff;
      border: none;
      border-radius: 40px;
      padding: 0 8px 0 20px;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      transition: box-shadow 0.2s;
    }
    .super-search-fm:focus-within {
      box-shadow: 0 6px 32px rgba(0,0,0,0.35);
    }
    .super-search-fm .search-key {
      flex: 1;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #222 !important;
      font-size: 1rem;
      padding: 14px 4px;
      height: auto;
    }
    .super-search-fm .search-key::placeholder { color: #aaa; }

    /* 搜索按钮 */
    .super-search-fm .submit {
      background: #1677ff;
      border: none;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      padding: 0;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .super-search-fm .submit:hover { background: #0958d9; transform: scale(1.05); }

    /* 引擎触发器 */
    .ws-engine-trigger {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none;
      color: #555;
      font-size: 0.83rem; font-weight: 600; font-family: inherit;
      cursor: pointer; padding: 10px 4px 10px 0;
      flex-shrink: 0; white-space: nowrap;
      transition: color 0.15s;
    }
    .ws-engine-trigger:hover { color: #1677ff; }
    .ws-engine-trigger img { width: 16px; height: 16px; border-radius: 3px; }
    .ws-engine-trigger .arrow { font-size: 0.62rem; opacity: 0.4; transition: transform 0.2s; }
    .ws-divider { width: 1px; height: 18px; background: #ddd; flex-shrink: 0; }

    /* ══════════════════════════════════════
       引擎面板（搜索框下方）
    ══════════════════════════════════════ */
    #search-list { margin-top: 14px; }
    .search-type { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
    .search-type li label {
      padding: 4px 16px; border-radius: 16px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600;
      color: rgba(255,255,255,0.65);
      transition: all 0.15s; margin: 0; user-select: none;
      border: 1px solid transparent;
    }
    .search-type li label:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .search-type li input[type=radio] { display: none; }
    .search-type li input[type=radio]:checked + label {
      color: #fff;
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.3);
    }

    /* ══════════════════════════════════════
       快捷引擎标签（对标图1搜索框下方那排）
    ══════════════════════════════════════ */
    .quick-engines {
      display: flex; gap: 6px; justify-content: center;
      flex-wrap: wrap; margin-top: 14px;
    }
    .quick-engine-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      color: rgba(255,255,255,0.8);
      font-size: 0.78rem; font-weight: 600;
      padding: 4px 14px; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .quick-engine-btn:hover,
    .quick-engine-btn.active {
      background: rgba(255,255,255,0.25);
      color: #fff;
      border-color: rgba(255,255,255,0.4);
    }

    /* ══════════════════════════════════════
       卡片图标
    ══════════════════════════════════════ */
    .url-img { width: 48px !important; height: 48px !important; flex-shrink: 0; }
    .url-img img { width: 36px !important; height: 36px !important; border-radius: 8px; object-fit: contain; }
    .url-card .card { border-radius: 10px; }

    /* ══════════════════════════════════════
       内容区
    ══════════════════════════════════════ */
    .content-wrap { overflow: auto; }


  </style>
</head>

<body class="io-grey-mode">
<div class="page-container">

  <!-- 左侧边栏 -->
  <div id="sidebar" class="sticky sidebar-nav fade mini-sidebar" style="width:60px;">
    <div class="modal-dialog h-100 sidebar-nav-inner">
      <div class="sidebar-logo border-bottom border-color">
        <div class="logo overflow-hidden">
          <a class="logo-expanded logo-title-link" onclick="switchToMain()">
            <span class="logo-title-text">王五导航</span>
            <span class="logo-title-sub">click to switch</span>
          </a>
          <a class="logo-collapsed logo-title-link" onclick="switchToMain()">
            <span class="logo-title-text">W5</span>
          </a>
        </div>
      </div>
      <div class="sidebar-menu flex-fill">
        <div class="sidebar-scroll">
          <div class="sidebar-menu-inner">
            <ul id="main-menu"></ul>
          </div>
        </div>
      </div>
      <div class="border-top py-2 border-color">
        <div class="flex-bottom">
          <ul>
            <li class="sidebar-item">
              <a onclick="switchToMain()" style="cursor:pointer;">
                <i class="fas fa-exchange-alt icon-fw icon-lg mr-2"></i>
                <span>切换主题</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div id="content-wrap" class="content-wrap">

    <!-- 顶部搜索 banner -->
    <div class="header-big post-top css-color mb-4" id="search-bg">

      <!-- 背景图层 -->
      <div class="banner-bg" id="banner-bg-layer"></div>
      <!-- 遮罩 -->
      <div class="banner-overlay"></div>


      <div class="s-search">
        <!-- 分类 Tab -->
        <div class="s-type text-center">
          <div class="s-type-list big" id="ws-tabs"></div>
        </div>

        <!-- 搜索框 -->
        <form class="super-search-fm" onsubmit="doSearch(event)">
          <button type="button" class="ws-engine-trigger" id="ws-engine-trigger" onclick="toggleEnginePanel()">
            <img id="ws-engine-icon" src="" alt="" onerror="this.style.display='none'">
            <span id="ws-engine-name"></span>
            <span class="arrow" id="ws-engine-arrow">▾</span>
          </button>
          <div class="ws-divider"></div>
          <input type="text" id="search-text" class="form-control search-key"
                 placeholder="搜索网页 / 定位站内网站"
                 autocomplete="off"
                 oninput="onSearchInput()"
                 onkeydown="onSearchKeydown(event)" />
          <button class="submit" type="submit">
            <i class="iconfont icon-search"></i>
          </button>
        </form>

        <!-- 快捷引擎标签（搜索框下方一排，对标图1） -->
        <div class="quick-engines" id="quick-engines"></div>

        <!-- 引擎面板（展开时显示） -->
        <div id="search-list" style="display:none;"></div>
      </div>
    </div>

    <!-- 链接内容区 -->
    <div id="content" class="content-site customize-site">
      <p style="color:#999;text-align:center;padding:3rem;">加载中...</p>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="assets/js/bootstrap.min-4.3.1.js"></script>
<script src="assets/js/lazyload.min-12.4.0.js"></script>
<script src="main.js"></script>
<script>
/* ══════════════════════════════════════
   侧边栏展开收缩
══════════════════════════════════════ */
(function() {
  const sidebar = document.getElementById('sidebar');
  const contentWrap = document.getElementById('content-wrap');
  const EXPANDED_W = '170px';
  const MINI_W = '60px';

  sidebar.addEventListener('mouseenter', expand);
  sidebar.addEventListener('mouseleave', collapse);

  function expand() {
    sidebar.classList.remove('mini-sidebar');
    sidebar.style.width = EXPANDED_W;
    contentWrap.style.marginLeft = EXPANDED_W;
  }
  function collapse() {
    sidebar.classList.add('mini-sidebar');
    sidebar.style.width = MINI_W;
    contentWrap.style.marginLeft = MINI_W;
  }
  collapse();
})();

/* ══════════════════════════════════════
   Banner 背景图
   修改下方路径即可更换背景图
   支持相对路径，如 assets/images/banner.jpg
══════════════════════════════════════ */
(function() {
  const BANNER_IMAGE = 'assets/images/banner.png';
  const layer = document.getElementById('banner-bg-layer');
  if (!layer) return;
  layer.style.backgroundImage = `url(${BANNER_IMAGE})`;
  requestAnimationFrame(() => layer.classList.add('loaded'));
})();
</script>
</body>
</html>
