<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>王五导航</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <link rel="preconnect" href="https://fonts.loli.net">
  <link href="https://fonts.loli.net/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bgLayer"></div>
<div id="bgOverlay"></div>

<!-- 左上：天气 -->
<div class="widget-corner" id="widget-tl">
  <div class="widget-box" id="weather-widget">
    <div id="weather-main">
      <span id="weather-icon">🌤</span>
      <div id="weather-right">
        <span id="weather-temp">--°C</span>
        <span id="weather-city-wrap">
          <span id="weather-city" title="点击修改城市">长春</span>
          <input id="weather-city-input" type="text" placeholder="输入城市名" style="display:none;">
        </span>
      </div>
    </div>
    <div id="weather-desc">加载中…</div>
  </div>
</div>

<!-- 左下：格言 -->
<div class="widget-corner" id="widget-bl">
  <div class="widget-box" id="quote-widget" title="点击换一条">
    <span id="quote-text">加载中…</span>
    <span id="quote-from"></span>
  </div>
</div>

<!-- 右下：音乐播放器 -->
<div class="widget-corner" id="widget-br">
  <div class="widget-box" id="music-widget">
    <!-- 折叠头部（移动端点击展开/收起） -->
    <div id="music-header">
      <img id="music-cover" src="" alt="封面">
      <div id="music-meta">
        <div id="music-title">未播放</div>
        <div id="music-artist"></div>
      </div>
      <button id="music-collapse-btn" title="折叠/展开">▼</button>
    </div>
    <!-- 可折叠内容 -->
    <div id="music-body">
      <div id="music-controls">
        <button class="music-btn" id="music-prev" title="上一首">⏮</button>
        <button class="music-btn" id="music-play" title="播放/暂停">▶</button>
        <button class="music-btn" id="music-next" title="下一首">⏭</button>
        <div id="music-progress-wrap">
          <div id="music-progress-bar"></div>
        </div>
        <span id="music-time">0:00</span>
      </div>
      <div id="music-vol-row">
        <span id="music-vol-icon">🔈</span>
        <input type="range" id="music-volume" min="0" max="1" step="0.05" value="0.7">
      </div>
      <button id="music-list-btn">▤ 歌单列表</button>
      <div id="music-list-panel"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="header-area">
    <img class="header-gif" id="icon-gif" alt="">
    <div>
      <h1 id="site-title" title="点击切换模式" style="cursor:pointer;">王五导航</h1>
    </div>
    <span class="header-icon" id="icon-sun" title="切换夜间模式" style="cursor:pointer;">☀️</span>
  </div>

  <!-- 标题下方天气行（移动端显示） -->
  <div id="weather-inline" style="display:none;text-align:center;margin:-0.8rem 0 1rem;font-size:0.8rem;color:rgba(255,255,255,0.7);"></div>
  <div class="search-wrapper">
    <div class="search-tabs" id="searchTabs"></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索网页 / 定位站内网站" autocomplete="off" oninput="filterLinks()" />
      <button class="clear-btn" id="clearBtn" aria-label="清空" style="display:none;" onclick="clearSearch()">✕</button>
      <button class="search-submit-btn" onclick="doSearch()" aria-label="搜索">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <div class="engine-list" id="enginePanel"></div>
  </div>

  <div id="main-content"></div>
</div>

<audio id="bg-audio" preload="none"></audio>

<script src="main.js"></script>
<script>
/* ===== 随机GIF装饰图标 ===== */
(function(){
  const GIF_DIR = './gif/';
  const GIFS = [
    'A girl with a flag+Shadow.gif',
    'Cute Mascot Jumping Character.gif',
    'Glowing Fish Loader.gif',
    'Happy Character Throwing Ball.gif',
    'Loader cat.gif',
    'Running Cat.gif',
    'Spin.gif',
    'Sushi.gif',
    'boxer lottie.gif',
    'loading.gif',
  ];
  const gifEl = document.getElementById('icon-gif');
  const pick  = GIFS[Math.floor(Math.random() * GIFS.length)];
  gifEl.src   = GIF_DIR + encodeURIComponent(pick);
})();

/* ===== 夜间模式（太阳/月亮） ===== */
(function(){
  const sunEl = document.getElementById('icon-sun');
  const KEY   = 'nav_dark_mode';
  function applyDark(on) {
    document.body.classList.toggle('dark-mode', on);
    sunEl.textContent = on ? '🌙' : '☀️';
    localStorage.setItem(KEY, on ? '1' : '0');
  }
  sunEl.addEventListener('click', () => applyDark(!document.body.classList.contains('dark-mode')));
  applyDark(localStorage.getItem(KEY) === '1');
})();

/* ===== 天气（支持自定义城市，搜索选择） ===== */
(function(){
  const iconEl  = document.getElementById('weather-icon');
  const tempEl  = document.getElementById('weather-temp');
  const descEl  = document.getElementById('weather-desc');
  const cityEl  = document.getElementById('weather-city');
  const inputEl = document.getElementById('weather-city-input');

  function wIcon(c){if(c===0)return'☀️';if(c<=2)return'🌤';if(c===3)return'☁️';if(c<=49)return'🌫';if(c<=59)return'🌦';if(c<=69)return'🌧';if(c<=79)return'❄️';if(c<=84)return'🌧';if(c<=99)return'⛈';return'🌈';}
  function wText(c){if(c===0)return'晴';if(c<=2)return'少云';if(c===3)return'阴';if(c<=49)return'雾';if(c<=59)return'毛毛雨';if(c<=69)return'雨';if(c<=79)return'雪';if(c<=84)return'阵雨';if(c<=99)return'雷雨';return'未知';}

  async function fetchWeather(lat, lon, cityName){
    const res  = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FShanghai&forecast_days=1`);
    const d    = await res.json();
    const code = d.current.weathercode, t = Math.round(d.current.temperature_2m);
    const tmax = Math.round(d.daily.temperature_2m_max[0]), tmin = Math.round(d.daily.temperature_2m_min[0]);
    const humid = d.current.relative_humidity_2m;
    const icon  = wIcon(code), desc = `${wText(code)}  ${tmin}~${tmax}°C  💧${humid}%`;
    iconEl.textContent = icon; tempEl.textContent = t+'°C'; descEl.textContent = desc;
    cityEl.textContent = cityName;
    sessionStorage.setItem('wx_nav', JSON.stringify({icon, temp:t+'°C', desc, city:cityName, ts:Date.now()}));
  }

  async function init(){
    const cached = sessionStorage.getItem('wx_nav');
    if(cached){ try{ const o=JSON.parse(cached); if(Date.now()-o.ts<5*60*1000){ iconEl.textContent=o.icon; tempEl.textContent=o.temp; descEl.textContent=o.desc; cityEl.textContent=o.city||'长春'; return; } }catch{} }
const savedCoord = localStorage.getItem('nav_weather_coord');
const savedCity  = localStorage.getItem('nav_weather_city');
if(savedCoord){
  try{ const c=JSON.parse(savedCoord); await fetchWeather(c.lat, c.lon, c.name||savedCity); return; }catch{}
}
try {
  const ipRes  = await fetch('https://ipapi.co/json/');
  const ipData = await ipRes.json();
  const city   = ipData.city || '长春';
  const lt     = ipData.latitude  || 43.8868;
  const lg     = ipData.longitude || 125.3245;
  await fetchWeather(lt, lg, city);
} catch {
  await fetchWeather(43.8868, 125.3245, '长春').catch(()=>{ descEl.textContent='获取失败'; });
}
  }
  function showCityEditor(){
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;z-index:9999;
      background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;
    `;
    overlay.innerHTML = `
      <div style="background:rgba(10,8,30,0.95);border:1px solid rgba(124,111,247,0.4);
        border-radius:14px;padding:1.5rem 2rem;min-width:320px;max-width:400px;width:90%;color:#fff;font-family:inherit;">
        <p style="margin:0 0 1rem;font-size:1rem;font-weight:600;">📍 修改天气城市</p>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input id="citySearchInput" placeholder="输入城市名搜索…"
            style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(124,111,247,0.4);
            background:rgba(124,111,247,0.1);color:#fff;font-size:0.9rem;box-sizing:border-box;">
          <button id="citySearchBtn" style="padding:8px 14px;border-radius:8px;border:none;
            background:#7c6ff7;color:#fff;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;">搜索</button>
        </div>
        <div id="cityResults" style="margin-bottom:1rem;max-height:200px;overflow-y:auto;"></div>
        <div id="citySelected" style="font-size:0.8rem;color:rgba(255,255,255,0.45);margin-bottom:1rem;min-height:1.2em;"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button id="cityCancelBtn" style="padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);
            background:transparent;color:#fff;cursor:pointer;font-family:inherit;">取消</button>
          <button id="citySaveBtn" style="padding:6px 16px;border-radius:8px;border:none;
            background:#7c6ff7;color:#fff;cursor:pointer;font-family:inherit;font-weight:600;opacity:0.4;" disabled>保存</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    let selectedCity = null;
    const searchInput = overlay.querySelector('#citySearchInput');
    const searchBtn   = overlay.querySelector('#citySearchBtn');
    const resultsEl   = overlay.querySelector('#cityResults');
    const selectedEl  = overlay.querySelector('#citySelected');
    const saveBtn     = overlay.querySelector('#citySaveBtn');

    async function doSearch(){
      const q = searchInput.value.trim();
      if(!q) return;
      resultsEl.innerHTML = '<p style="font-size:0.85rem;color:rgba(255,255,255,0.45);margin:0;">搜索中…</p>';
      try{
        const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=10&language=zh&format=json`);
        const data = await res.json();
        if(!data.results || !data.results.length){
          resultsEl.innerHTML = '<p style="font-size:0.85rem;color:rgba(255,255,255,0.45);margin:0;">未找到相关城市，请换个关键词</p>';
          return;
        }
        resultsEl.innerHTML = '';
        data.results.forEach(city => {
          const label = [city.name, city.admin1, city.country].filter(Boolean).join('，');
          const btn = document.createElement('button');
          btn.textContent = label;
          btn.style.cssText = `
            display:block;width:100%;text-align:left;padding:8px 10px;margin-bottom:4px;
            border-radius:8px;border:1px solid rgba(124,111,247,0.2);
            background:rgba(124,111,247,0.08);color:#fff;cursor:pointer;
            font-family:inherit;font-size:0.85rem;transition:background 0.15s;
          `;
          
          btn.addEventListener('click', () => {
  selectedCity = { name: city.name, lat: city.latitude, lon: city.longitude };
  selectedEl.textContent = `已选：${label}（${city.latitude.toFixed(4)}, ${city.longitude.toFixed(4)}）`;
  saveBtn.disabled = false;
  saveBtn.style.opacity = '1';
  resultsEl.querySelectorAll('button').forEach(b => {
    b.style.background = 'rgba(124,111,247,0.08)';
    b.style.border = '1px solid rgba(124,111,247,0.2)';
  });
  btn.style.background = 'rgba(124,111,247,0.25)';
  btn.style.border = '1px solid rgba(124,111,247,0.6)';
});
          resultsEl.appendChild(btn);
        });
      } catch {
        resultsEl.innerHTML = '<p style="font-size:0.85rem;color:rgba(255,255,255,0.45);margin:0;">搜索失败，请检查网络</p>';
      }
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => { if(e.key === 'Enter') doSearch(); });
    overlay.querySelector('#cityCancelBtn').onclick = () => overlay.remove();
    saveBtn.onclick = () => {
      if(!selectedCity) return;
      localStorage.setItem('nav_weather_city',  selectedCity.name);
      localStorage.setItem('nav_weather_coord', JSON.stringify(selectedCity));
      sessionStorage.removeItem('wx_nav');
      overlay.remove();
      fetchWeather(selectedCity.lat, selectedCity.lon, selectedCity.name)
        .catch(() => { descEl.textContent = '获取失败'; });
    };
    overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
    setTimeout(() => searchInput.focus(), 80);
  }

  /* 点击城市名打开弹窗，不再用内联输入框 */
  cityEl.addEventListener('pointerup', e => { e.preventDefault(); showCityEditor(); });

  /* 隐藏原来的内联输入框，不再用它 */
  if(inputEl) inputEl.style.display = 'none';

  function syncInlineWeather(){
    const el = document.getElementById('weather-inline');
    if(!el) return;
    if(window.innerWidth <= 600){
      el.style.display = 'block';
      el.textContent = iconEl.textContent + ' ' + tempEl.textContent + '  ' + cityEl.textContent + '  ' + descEl.textContent;
    } else {
      el.style.display = 'none';
    }
  }
  window.addEventListener('resize', syncInlineWeather);
  init().then(syncInlineWeather).catch(()=>{});
})();

/* ===== 格言 ===== */
(function(){
  let quotes=[], idx=-1;
  const tEl=document.getElementById('quote-text'), fEl=document.getElementById('quote-from');
  function show(){ if(!quotes.length)return; let ni; do{ ni=Math.floor(Math.random()*quotes.length); }while(ni===idx&&quotes.length>1); idx=ni; const q=quotes[idx]; tEl.textContent=q.text||''; fEl.textContent=q.from?'——'+q.from:''; }
  fetch('../quotes.json').then(r=>r.json()).then(d=>{ quotes=d; show(); }).catch(()=>{ tEl.textContent=''; });
  document.getElementById('quote-widget').addEventListener('click', show);
})();

/* ===== 音乐播放器 ===== */
(function(){
  const BASE_M = 'https://raw.githubusercontent.com/xmynscnq/profile/main/musics/';
  const BASE_C = 'https://raw.githubusercontent.com/xmynscnq/profile/main/pics/music-bg/';
  const CUSTOM_PLAYLIST = [
    { name:'乌鸦之歌',            artist:'',            cover: BASE_C+'乌鸦之歌.jpg',        url: BASE_M+'乌鸦之歌.mp3' },
    { name:'兰亭序',              artist:'周杰伦',       cover: BASE_C+'兰亭序.webp',          url: BASE_M+'兰亭序-周杰伦.mp3' },
    { name:'菊花台',              artist:'周杰伦',       cover: BASE_C+'菊花台.webp',          url: BASE_M+'周杰伦-菊花台.m4a' },
    { name:'孤夜',                artist:'',            cover: BASE_C+'孤夜.jpg',             url: BASE_M+'孤夜.mp3' },
    { name:'征尘别',              artist:'',            cover: BASE_C+'征尘别.jpg',           url: BASE_M+'征尘别.mp3' },
    { name:'把悲伤留给自己',       artist:'陈升',        cover: BASE_C+'把悲伤留给自己.jpg',    url: BASE_M+'把悲伤留给自己-陈升.mp3' },
    { name:'月になんて',           artist:'OLEDICKFOGGY',cover: BASE_C+'成为月亮.jpg',         url: BASE_M+'月になんて-OLEDICKFOGGY.mp3' },
    { name:'未唱给苏小姐的歌',     artist:'',            cover: BASE_C+'未唱给苏小姐的歌.jpg', url: BASE_M+'未唱给苏小姐的歌.mp3' },
  ];

  const audio        = document.getElementById('bg-audio');
  const playBtn      = document.getElementById('music-play');
  const prevBtn      = document.getElementById('music-prev');
  const nextBtn      = document.getElementById('music-next');
  const titleEl      = document.getElementById('music-title');
  const artistEl     = document.getElementById('music-artist');
  const coverEl      = document.getElementById('music-cover');
  const progressBar  = document.getElementById('music-progress-bar');
  const progressWrap = document.getElementById('music-progress-wrap');
  const timeEl       = document.getElementById('music-time');
  const volInput     = document.getElementById('music-volume');
  const volIcon      = document.getElementById('music-vol-icon');
  const listBtn      = document.getElementById('music-list-btn');
  const listPanel    = document.getElementById('music-list-panel');
  const collapseBtn  = document.getElementById('music-collapse-btn');
  const musicBody    = document.getElementById('music-body');

  let playlist = [...CUSTOM_PLAYLIST];
  let cur = 0, muted = false, loading = false;

  /* ── 修复③：先声明 collapsed，再根据屏幕决定初始值 ── */
  let collapsed = window.innerWidth <= 600;
  if (collapsed) {
    musicBody.style.display = 'none';
    collapseBtn.textContent = '▲';
  }

  const useCustom = CUSTOM_PLAYLIST.length > 0;

  /* 折叠/展开 */
  collapseBtn.addEventListener('click', ()=>{
    collapsed = !collapsed;
    musicBody.style.display  = collapsed ? 'none' : '';
    collapseBtn.textContent  = collapsed ? '▲' : '▼';
  });

  function fmt(s){ const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

  async function fetchRandom(){
    // 随机打乱API顺序，负载均衡
    const apis = [...MUSIC_APIS].sort(() => Math.random() - 0.5);
    let lastErr;
    for (const api of apis) {
      try {
        const res  = await fetch(api.url, { signal: AbortSignal.timeout(6000) });
        const data = await res.json();
        if (!api.check(data)) continue;
        const t = api.parse(data);
        if (!t.audio) continue;
        return { name: t.name, artist: t.artist, cover: t.cover, url: t.audio };
      } catch(e) { lastErr = e; }
    }
    throw lastErr || new Error('所有音乐接口均失败');
  }

  function renderList(){
    listPanel.innerHTML='';
    playlist.forEach((t,i)=>{
      const div=document.createElement('div');
      div.className='music-list-item'+(i===cur?' active':'');
      div.innerHTML=`<img class="music-list-item-cover" src="${t.cover||''}" onerror="this.style.display='none'" alt=""><span class="music-list-item-name">${t.name||'音轨'+(i+1)}</span>`;
      div.addEventListener('click',()=>{ cur=i; playTrack(playlist[i]); renderList(); });
      listPanel.appendChild(div);
    });
  }

  function playTrack(t){
    if(!t.url){ nextTrack(); return; }
    audio.src=t.url;
    titleEl.textContent  = t.name   || '未知歌曲';
    artistEl.textContent = t.artist || '';
    if(t.cover){ coverEl.src=t.cover; coverEl.style.display='block'; }
    else        { coverEl.src='';     coverEl.style.display='none';  }
    audio.load();
    audio.play().catch(()=>{});
  }

  function loadIndex(i, autoplay = true){
    cur = (i + playlist.length) % playlist.length;
    const t = playlist[cur];
    if(!autoplay){
      // 仅更新UI，不播放
      titleEl.textContent  = t.name   || '未知歌曲';
      artistEl.textContent = t.artist || '';
      if(t.cover){ coverEl.src = t.cover; coverEl.style.display = 'block'; }
      else        { coverEl.src = '';     coverEl.style.display = 'none';  }
      audio.src = t.url;
      audio.load();
      renderList();
    } else {
      playTrack(t); renderList();
    }
  }

  async function nextTrack(){
    if(loading) return;
    if(useCustom){ loadIndex(cur+1, true); return; }
    loading=true;
    titleEl.textContent='加载中…'; artistEl.textContent='';
    coverEl.style.display='none';
    try{
      const t=await fetchRandom();
      playlist.push(t); cur=playlist.length-1;
      playTrack(t); renderList();
    } catch(e){
      titleEl.textContent='加载失败，重试中…';
      setTimeout(nextTrack, 2000);
    } finally{ loading=false; }
  }

  function prevTrack(){
    if(useCustom){ loadIndex(cur-1, true); return; }
    if(cur>0){ cur--; playTrack(playlist[cur]); renderList(); }
    else nextTrack();
  }

  function togglePlay(){
    if(!audio.src||audio.src===window.location.href){ nextTrack(); return; }
    audio.paused ? audio.play() : audio.pause();
  }

  audio.addEventListener('play',  ()=>{ playBtn.textContent='⏸'; coverEl.classList.add('spinning'); });
  audio.addEventListener('pause', ()=>{ playBtn.textContent='▶'; coverEl.classList.remove('spinning'); });
  audio.addEventListener('ended', ()=> nextTrack());
  audio.addEventListener('timeupdate', ()=>{
    if(audio.duration) progressBar.style.width=(audio.currentTime/audio.duration*100)+'%';
    timeEl.textContent=fmt(audio.currentTime)+(audio.duration?' / '+fmt(audio.duration):'');
  });
  progressWrap.addEventListener('click', e=>{
    if(!audio.duration) return;
    const r=progressWrap.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
  });

  volInput.value=audio.volume=0.7;
  volInput.addEventListener('input',()=>{ audio.volume=parseFloat(volInput.value); muted=audio.volume===0; volIcon.textContent=muted?'🔇':'🔈'; });
  volIcon.addEventListener('click',()=>{ muted=!muted; audio.volume=muted?0:parseFloat(volInput.value)||0.7; volIcon.textContent=muted?'🔇':'🔈'; });

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', prevTrack);
  nextBtn.addEventListener('click', nextTrack);
  listBtn.addEventListener('click',()=>{
    listPanel.classList.toggle('open');
    listBtn.textContent=listPanel.classList.contains('open')?'▲ 收起列表':'▤ 歌单列表';
  });

  if(useCustom){
    loadIndex(0, false); // 预加载第一首，显示封面，不自动播放
  }
})();
</script>
</body>
</html>
